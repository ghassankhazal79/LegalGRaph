<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><title>Entity Graph</title><link rel="stylesheet" href="/static/style.css"><script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script></head><body><div class="container wide"><a class="link" href="/entities">← رجوع</a><h1>مخطط العلاقات بين الكيانات</h1><p class="muted">العلاقة تعني ظهور كيانين في نفس المادة/الوثيقة.</p><div class="card"><div id="network"></div></div></div><script>fetch('/api/entity-graph').then(r=>r.json()).then(data=>{const nodes=new vis.DataSet(data.nodes);const edges=new vis.DataSet(data.edges);const options={nodes:{shape:'dot',scaling:{min:8,max:35},font:{size:14,face:'Arial'}},edges:{smooth:true,scaling:{min:1,max:8},color:{opacity:.35}},physics:{stabilization:true,barnesHut:{gravitationalConstant:-18000,springLength:130}},interaction:{hover:true,tooltipDelay:120}};new vis.Network(document.getElementById('network'),{nodes,edges},options);});</script></body></html>
